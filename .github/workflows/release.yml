name: Image

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: openlinker-core-web
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  build-image:
    name: Build image
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          short_sha="${GITHUB_SHA::12}"
          image="${REGISTRY}/${owner}/${IMAGE_NAME}"
          version="sha-${short_sha}"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME}"
          fi

          {
            echo "image=${image}"
            echo "short_sha=${short_sha}"
            echo "version=${version}"
            echo "created=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "tags<<EOF"
            echo "${image}:sha-${short_sha}"
            if [[ "${GITHUB_REF_TYPE}" == "branch" ]]; then
              echo "${image}:${GITHUB_REF_NAME//\//-}"
            fi
            if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
              echo "${image}:${GITHUB_REF_NAME}"
              echo "${image}:latest"
            fi
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.server
          platforms: ${{ env.PLATFORMS }}
          build-args: |
            API_URL=http://core-api:8080
            CORE_API_URL=http://core-api:8080
            NEXT_PUBLIC_API_URL=http://localhost:8080
            NEXT_PUBLIC_ALLOW_LOCAL_HTTP_ENDPOINTS=true
            OPENLINKER_GIT_SHA=${{ github.sha }}
            OPENLINKER_RELEASE_ID=${{ steps.meta.outputs.version }}
            OPENLINKER_DEPLOYED_AT=${{ steps.meta.outputs.created }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=${{ env.IMAGE_NAME }}
          cache-from: type=gha,scope=${{ env.IMAGE_NAME }}
          cache-to: type=gha,scope=${{ env.IMAGE_NAME }},mode=max

      - name: Inspect pushed manifest
        shell: bash
        run: docker buildx imagetools inspect "${{ steps.meta.outputs.image }}:sha-${{ steps.meta.outputs.short_sha }}"
