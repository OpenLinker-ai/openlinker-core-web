name: CI

on:
  pull_request:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Check localized copy
        run: npm run check:i18n

      - name: Check Agent library card contract
        run: npm run test:agent-library-card

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
